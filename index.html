<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="./manifest.json" />
<title>Fit Guide</title>
<style>
  @font-face {
    font-family: 'Busan';
    src: url('https://cdn.jsdelivr.net/korean-webfonts/1/orgs/govs/busan/Busan/Busan.woff2') format('woff2'),
         url('https://cdn.jsdelivr.net/korean-webfonts/1/orgs/govs/busan/Busan/Busan.woff') format('woff');
    font-weight: 400;
    font-display: swap;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f8f7f5;
    font-family: 'Busan', sans-serif;
    touch-action: none;
  }

  /* ── 로딩 화면 ─────────────────────────────────────────────── */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: #f8f7f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.6s ease;
  }
  #loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #loading-title {
    font-size: 14px;
    letter-spacing: 0.2em;
    color: #1a1a1a;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  #loading-bar-wrap {
    width: 200px;
    height: 2px;
    background: rgba(0,0,0,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  #loading-bar {
    height: 100%;
    width: 0%;
    background: #1a1a1a;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  #loading-percent {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #999;
  }

  #loading-status {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: #bbb;
    margin-top: 8px;
  }

  /* ── 전체 앱 ───────────────────────────────────────────────── */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8f7f5;
  }

  #video-wrap {
    position: relative;
    height: 100dvh;
    width: calc(100dvh * (1640 / 2360));
    max-width: 100vw;
    max-height: calc(100vw * (2360 / 1640));
    overflow: hidden;
    background: #f8f7f5;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
    background: #f8f7f5;          /* 프레임 공백 시 검정 대신 배경색 */
    opacity: 0;
    transition: opacity 0.6s ease;
    will-change: opacity;
  }
  video.show { opacity: 1; }

  #autoplay-indicator {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  #autoplay-indicator.visible { opacity: 1; }

  #autoplay-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #1a1a1a;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.3; transform: scale(0.6); }
  }

  #autoplay-label {
    font-size: 8px;
    letter-spacing: 0.24em;
    color: #555;
    text-transform: uppercase;
  }

  #progress-dots { display: none; }

  .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(0,0,0,0.15);
    transition: background 0.3s ease, transform 0.3s ease;
  }
  .dot.active {
    background: #1a1a1a;
    transform: scale(1.6);
  }

  /* ── 핏 버튼 (오른쪽 세로 스택, TECH DETAIL 도식화 위) ───────── */
  #sidebar {
    position: absolute;
    top: 15%;
    right: 6.5%;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0.75vh;
    width: 20.9%;
  }

  .side-divider {
    height: 1.5px;
    background: rgba(0,0,0,0.18);
    margin: 0.4vh 0;
  }

  .fit-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 0.3vh;
    width: 100%;
    min-height: 5.6vh;
    padding: 1vh 1.1vh;
    background: #ffffff;
    border: 1.5px solid #cccccc;        /* 기본: 연한 회색 테두리 */
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.15s ease;
  }

  /* 활성(자동 롤링 도달 / 선택): deep grey 배경 + 화이트 글씨 */
  .fit-btn.active {
    background: #5a5a5a;
    border-color: #5a5a5a;
  }

  .fit-btn:active { transform: scale(0.97); }

  .btn-index { display: none; }

  .btn-group {
    font-size: 1vh;
    letter-spacing: 0.14em;
    color: #b5b5b5;                     /* 기본: 연한 회색 글씨 */
    text-transform: uppercase;
    line-height: 1;
    order: -1;
  }
  .fit-btn.active .btn-group { color: rgba(255,255,255,0.72); }

  .btn-label {
    font-size: 1.35vh;
    letter-spacing: 0.01em;
    color: #b5b5b5;                     /* 기본: 연한 회색 글씨 */
    text-transform: uppercase;
    white-space: nowrap;
    font-weight: 700;
    line-height: 1.15;
  }
  .fit-btn.active .btn-label { color: #ffffff; }
</style>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loading-screen">
  <div id="loading-title">Fit Guide</div>
  <div id="loading-bar-wrap">
    <div id="loading-bar"></div>
  </div>
  <div id="loading-percent">0%</div>
  <div id="loading-status">preparing for offline use...</div>
</div>

<!-- 메인 앱 -->
<div id="app" style="display:none;">
  <div id="video-wrap">
    <video id="video-a" class="show" muted playsinline webkit-playsinline preload="auto"></video>
    <video id="video-b" muted playsinline webkit-playsinline preload="auto"></video>
    <div id="autoplay-indicator">
      <div id="autoplay-dot"></div>
      <div id="autoplay-label">Auto</div>
    </div>
    <div id="progress-dots"></div>
    <div id="sidebar"></div>
  </div>
</div>

<script>
/* ================================================================
   ★ 영상 파일 목록
   ================================================================ */
const FITS = [
  { name: 'Straight',    path: './straight-uni.mp4'      , group: 'Uni'   },
  { name: 'Wide',        path: './wide-uni.mp4'           , group: 'Uni'   },
  { name: 'Curved Wide', path: './curved-wide-uni.mp4'    , group: 'Uni'   },
  { name: 'Comfortable', path: './comfortable-uni.mp4'    , group: 'Uni'   },
  { name: 'Semi Wide',   path: './semi-wide-women.mp4'    , group: 'Women' },
  { name: 'Flare',       path: './flare-women.mp4'        , group: 'Women' },
  { name: 'Wide',        path: './wide-women.mp4'         , group: 'Women' },
];

const INACTIVITY_TIMEOUT_MS = 7000;

let currentIndex    = 0;
let isAutoplaying   = true;
let inactivityTimer = null;

/* 두 개의 영상 레이어를 번갈아 사용해 크로스페이드 전환 */
const vids  = [document.getElementById('video-a'), document.getElementById('video-b')];
let   front = 0;  // 현재 화면에 보이는 레이어 인덱스
const dotsEl      = document.getElementById('progress-dots');
const sidebar     = document.getElementById('sidebar');
const autoInd     = document.getElementById('autoplay-indicator');

/* ================================================================
   ★ Service Worker 등록 + 캐싱 진행률 표시
   ================================================================ */
const loadingScreen  = document.getElementById('loading-screen');
const loadingBar     = document.getElementById('loading-bar');
const loadingPercent = document.getElementById('loading-percent');
const loadingStatus  = document.getElementById('loading-status');
const appEl          = document.getElementById('app');

async function registerSW() {
  if (!('serviceWorker' in navigator)) {
    showApp();
    return;
  }

  try {
    // 기존 SW 해제 후 새로 등록 (캐시 문제 방지)
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) await r.unregister();

    // 이전 캐시 모두 삭제
    const keys = await caches.keys();
    for (const k of keys) await caches.delete(k);

    await navigator.serviceWorker.register('./sw.js');
  } catch (err) {
    console.warn('SW 등록 실패:', err);
  }

  // SW 등록과 관계없이 바로 앱 시작 (영상은 네트워크에서 직접 로드)
  showApp();
}

function showApp() {
  appEl.style.display = '';
  loadingScreen.classList.add('hidden');
  setTimeout(() => { loadingScreen.style.display = 'none'; }, 600);
  init();
}

/* ================================================================
   ★ 핏 가이드 로직 (기존과 동일)
   ================================================================ */
function buildUI() {
  FITS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });

  FITS.forEach((fit, i) => {
    if (i === 4) {
      sidebar.appendChild(Object.assign(document.createElement('div'), { className: 'side-divider' }));
    }
    const btn = document.createElement('button');
    btn.className = 'fit-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `
      <span class="btn-group">${fit.group}</span>
      <span class="btn-label">${fit.name}</span>
    `;
    btn.addEventListener('pointerdown', () => onFitTapped(i));
    sidebar.appendChild(btn);
  });
}

/* 현재 보이는 레이어가 끝나면(자동재생 시) 다음 핏으로 */
function setEndedHandler() {
  vids.forEach(v => { v.onended = null; });
  if (isAutoplaying) {
    vids[front].onended = () => {
      if (isAutoplaying) switchTo((currentIndex + 1) % FITS.length);
    };
  }
}

let isSwitching = false;

/* 다음 핏을 뒤쪽 레이어에 로드 → 재생이 시작되면 두 레이어를 크로스페이드 */
function switchTo(index, immediate) {
  if (index === currentIndex && vids[front].src && !immediate) return;
  currentIndex = index;
  updateUI();

  const cur = vids[front];
  const nxt = vids[1 - front];

  isSwitching = true;
  nxt.onended = null;
  nxt.classList.remove('show');
  nxt.src = FITS[index].path;
  nxt.load();

  const reveal = () => {
    nxt.removeEventListener('playing', reveal);
    // 새 영상이 실제로 프레임을 그리기 시작한 뒤에만 전환 → 검정/흰 깜빡임 없음
    nxt.classList.add('show');
    cur.classList.remove('show');
    front = 1 - front;
    isSwitching = false;
    setEndedHandler();
    // 페이드가 끝난 뒤 이전 레이어 정지(메모리 절약)
    setTimeout(() => { try { cur.pause(); } catch (e) {} }, 700);
  };

  nxt.addEventListener('playing', reveal);
  nxt.play().catch(() => {});
}

function updateUI() {
  document.querySelectorAll('.fit-btn').forEach((btn, i) => btn.classList.toggle('active', i === currentIndex));
  document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
  autoInd.classList.toggle('visible', isAutoplaying);
}

function startAutoplay() {
  isAutoplaying = true;
  updateUI();
  setEndedHandler();
}

function pauseAutoplay() {
  isAutoplaying = false;
  setEndedHandler();
  updateUI();
}

function resetInactivityTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(startAutoplay, INACTIVITY_TIMEOUT_MS);
}

function onFitTapped(index) {
  pauseAutoplay();
  resetInactivityTimer();
  switchTo(index);
}

function init() {
  buildUI();
  // 첫 핏: 앞쪽 레이어에 바로 로드해서 재생
  const first = vids[0];
  first.classList.add('show');
  first.src = FITS[0].path;
  first.load();
  first.play().catch(() => {});
  currentIndex = 0;
  startAutoplay();
}

/* ── 시작 ──────────────────────────────────────────────────────── */
registerSW();
</script>
</body>
</html>
